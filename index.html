<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王小明 | 基隆市立中山高中</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 350px;
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .school-logo {
            width: 80px;
            margin-bottom: 10px;
        }
        .header {
            margin-bottom: 15px;
        }
        h1 { font-size: 18px; margin: 5px 0; color: #003366; line-height: 1.2; }
        .eng-title { font-size: 11px; color: #777; font-weight: normal; margin-bottom: 15px; }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #f0f0f0;
            margin: 0 auto 15px;
            border: 3px solid #eee;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
        }
        
        .name-block {
            margin-bottom: 20px;
        }
        .user-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .section-title {
            font-size: 16px;
            color: #555;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }
        .section-title span {
            display: block;
            font-size: 11px;
            color: #888;
        }

        .links { margin-top: 20px; }
        .btn {
            display: block;
            padding: 14px;
            margin: 10px 0;
            background: #005087;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #003366;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-secondary { background: #6c757d; }
        .btn-accent { background: #1a8a34; }
    </style>
</head>
<body>

<div class="card">
    <!-- 學校 Logo 與 校名 -->
    <div class="header">
        <img src="https://www.csgh.kl.edu.tw/resource/open_data/school_logo.png" alt="中山高中Logo" class="school-logo">
        <h1>基隆市立中山高級中學</h1>
        <div class="eng-title">Keelung Municipal Zhongshan Senior High School</div>
    </div>

    <!-- 短髮女性頭像 -->
    <div class="avatar">👩🏻‍💼</div>

    <!-- 姓名與單位 -->
    <div class="name-block">
        <p class="user-name">王小明</p>
        <div class="section-title">
            國際教育小組
            <span>International Education Team</span>
        </div>
    </div>
    
    <!-- 功能按鈕 -->
    <div class="links">
        <a href="https://www.csgh.kl.edu.tw" target="_blank" class="btn">🏫 學校網頁 Official Website</a>
        <a href="mailto:international@csgh.kl.edu.tw" class="btn btn-secondary">📧 國際教育小組 Email</a>
        <a href="mailto:aaa@aaa.com" class="btn btn-accent">✍️ 聯絡我 Contact Me</a>
    </div>
</div>

</body>
</html>
